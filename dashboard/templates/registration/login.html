{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Haze Studios</title>
    <link rel="stylesheet" href="{% static 'css/haze.css' %}">
</head>
<body>
<div class="login-wrap">
    <div class="login-box">
        <div class="login-brand">HAZE STUDIOS</div>
        <h1>Panel Admin</h1>

        {% if form.errors %}
        <ul class="messages">
            <li class="error">Usuario o contraseña incorrectos.</li>
        </ul>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label>Usuario</label>
                <input type="text" name="username" autofocus required>
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" name="password" required>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Ingresar</button>
            </div>
        </form>

        <div style="text-align:center; margin-top:1.25rem;">
            <a href="{% url 'recuperar_password' %}" style="color:var(--gris-500); font-size:.85rem; text-decoration:none;">
                ¿Olvidaste tu contraseña?
            </a>
        </div>
    </div>
</div>
</body>
</html>
